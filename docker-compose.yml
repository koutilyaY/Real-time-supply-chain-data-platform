# =============================================================================
# Real-Time Supply-Chain Data Platform
# Default `docker compose up` brings up the VERTICAL SLICE:
#   generator -> kafka -> flink -> iceberg(minio) -> trino -> api
# Optional layers via profiles:
#   --profile observability  (prometheus, grafana)
#   --profile bi             (superset)
#   --profile orchestration  (dagster)
#   --profile ml             (mlflow)
#   --profile rag            (qdrant, ollama)
# Example: docker compose --profile bi --profile observability up -d
# =============================================================================

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
  AWS_REGION: ${AWS_REGION:-us-east-1}

services:
  # ---------------------------------------------------------------------------
  # Object storage (Iceberg warehouse)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
      MINIO_PROMETHEUS_AUTH_TYPE: public   # expose /minio/v2/metrics/* without auth
    ports:
      - "${MINIO_API_PORT:-9000}:9000"       # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [platform]

  # Creates the warehouse bucket on startup, then exits.
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-password} &&
      mc mb -p local/${WAREHOUSE_BUCKET:-warehouse} &&
      mc mb -p local/mlflow &&
      mc anonymous set none local/${WAREHOUSE_BUCKET:-warehouse} &&
      mc version enable local/${WAREHOUSE_BUCKET:-warehouse} &&
      mc version enable local/mlflow &&
      echo 'buckets ready (versioning enabled)';
      "
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Kafka (KRaft, single broker) - event bus
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"  # external listener for host clients
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Iceberg REST catalog (backed by MinIO via S3FileIO)
  # ---------------------------------------------------------------------------
  iceberg-rest:
    build: ./infra/iceberg-rest   # fixture + Postgres JDBC driver
    image: scp/iceberg-rest:1.8.1
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      <<: *aws-env
      CATALOG_WAREHOUSE: s3://${WAREHOUSE_BUCKET:-warehouse}/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      # Postgres-backed JDBC catalog: handles concurrent commits from all the
      # Flink jobs (SQLite cannot). The fixture maps env `_`->`.`, so
      # CATALOG_JDBC_USER -> jdbc.user and CATALOG_JDBC_PASSWORD -> jdbc.password.
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/iceberg
      CATALOG_JDBC_USER: ${POSTGRES_USER:-platform}
      CATALOG_JDBC_PASSWORD: ${POSTGRES_PASSWORD:-platform}
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Schema Registry (Apicurio, Confluent-compatible API at /apis/ccompat/v7)
  # ---------------------------------------------------------------------------
  apicurio:
    image: apicurio/apicurio-registry-mem:2.6.13.Final
    restart: unless-stopped
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/apis/ccompat/v7/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Flink (custom image with Iceberg + Kafka connectors) - stream processing
  # ---------------------------------------------------------------------------
  flink-jobmanager:
    build: ./infra/flink
    image: scp/flink:1.19
    command: jobmanager
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
    ports:
      - "8081:8081"  # Flink UI
    environment:
      <<: *aws-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        rest.flamegraph.enabled: true
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    volumes:
      - ./infra/flink/sql:/opt/flink/sql:ro
    networks: [platform]

  flink-taskmanager:
    image: scp/flink:1.19
    build: ./infra/flink
    command: taskmanager
    restart: unless-stopped
    depends_on:
      - flink-jobmanager
    environment:
      <<: *aws-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2560m
        taskmanager.numberOfTaskSlots: 4
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Trino - interactive SQL over the lakehouse
  # ---------------------------------------------------------------------------
  trino:
    image: trinodb/trino:455
    restart: unless-stopped
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Synthetic data generator -> Kafka
  # ---------------------------------------------------------------------------
  generator:
    build: ./ingestion/generator
    image: scp/generator
    restart: unless-stopped   # idempotent producer can go fatal on broker restart
    depends_on:
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://apicurio:8080/apis/ccompat/v7
      GEN_EVENTS_PER_SEC: ${GEN_EVENTS_PER_SEC:-20}
      GEN_SEED: ${GEN_SEED:-42}
    networks: [platform]

  # ---------------------------------------------------------------------------
  # CDC ingestion: simulated ERP Postgres (logical replication) -> Debezium -> Kafka
  # Enable with: docker compose --profile cdc up -d
  # ---------------------------------------------------------------------------
  erp-db:
    image: postgres:16
    profiles: [cdc]
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    volumes:
      - erp-db-data:/var/lib/postgresql/data
      - ./ingestion/cdc/erp_seed.sql:/docker-entrypoint-initdb.d/erp_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [platform]

  kafka-connect:
    image: quay.io/debezium/connect:2.7
    profiles: [cdc]
    depends_on:
      kafka:
        condition: service_healthy
      erp-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Serving API (FastAPI over Trino)
  # ---------------------------------------------------------------------------
  api:
    build: ./serving/api
    image: scp/api
    restart: unless-stopped
    depends_on:
      trino:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_USER: api
      API_KEY: ${API_KEY:-dev-secret-key}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-120/minute}
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Shared Postgres (Superset / Dagster / MLflow metadata)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [platform]

  # ---------------------------------------------------------------------------
  # BI - Apache Superset
  # ---------------------------------------------------------------------------
  superset:
    build: ./infra/superset
    image: scp/superset
    profiles: [bi]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/superset
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Orchestration - Dagster (webserver + daemon)
  # ---------------------------------------------------------------------------
  dagster:
    build: ./orchestration/dagster
    image: scp/dagster
    profiles: [orchestration]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      <<: *aws-env
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_USER: ${POSTGRES_USER:-platform}
      DAGSTER_PG_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      DAGSTER_PG_DB: dagster
      TRINO_HOST: trino
      DBT_PROJECT_DIR: /opt/dagster/dbt
    volumes:
      - ./transformations/dbt:/opt/dagster/dbt
    networks: [platform]

  # ---------------------------------------------------------------------------
  # ML - MLflow tracking server (artifacts in MinIO)
  # ---------------------------------------------------------------------------
  mlflow:
    build: ./ml
    image: scp/mlflow
    profiles: [ml]
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      <<: *aws-env
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      BACKEND_URI: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/mlflow
      ARTIFACT_ROOT: s3://mlflow/
    networks: [platform]

  # ---------------------------------------------------------------------------
  # RAG - Qdrant vector store + Ollama local LLM
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.11.3
    profiles: [rag]
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [platform]

  ollama:
    image: ollama/ollama:0.3.12
    profiles: [rag]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks: [platform]

  rag-api:
    build: ./rag
    image: scp/rag-api
    profiles: [rag]
    depends_on:
      - qdrant
      - ollama
    ports:
      - "8100:8100"
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    networks: [platform]

  # ---------------------------------------------------------------------------
  # Observability - Prometheus + Grafana
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [observability]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus:/etc/prometheus:ro
    networks: [platform]

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [observability]
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [platform]

volumes:
  minio-data:
  pg-data:
  qdrant-data:
  ollama-data:
  erp-db-data:

networks:
  platform:
    name: platform

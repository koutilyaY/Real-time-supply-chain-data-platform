global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI exposes /metrics (prometheus_client)
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Flink can export metrics via the prometheus reporter (see infra/flink notes).
  - job_name: flink
    static_configs:
      - targets: ["flink-jobmanager:9249", "flink-taskmanager:9249"]

  # MinIO cluster metrics (public endpoint in dev).
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

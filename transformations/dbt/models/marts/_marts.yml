version: 2

models:
  - name: fct_revenue_hourly
    description: "Hourly gross revenue and order counts by region."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [region, revenue_hour]
    columns:
      - name: region
        tests: [not_null]
      - name: revenue_hour
        tests: [not_null]
      - name: gross_revenue
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: agg_inventory_health
    description: "SKUs below reorder point and total shortfall by warehouse."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [warehouse_id, region]
    columns:
      - name: warehouse_id
        tests: [not_null]
      - name: skus_below_reorder
        tests: [not_null]

  - name: fct_carrier_performance
    description: "Carrier delay/on-time rates."
    columns:
      - name: carrier
        tests: [not_null, unique]
      - name: on_time_rate
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
              inclusive: true

  - name: fct_orders_secure
    description: "Order facts with customer_id masked (sha256) per governance policy."
    columns:
      - name: customer_id_hash
        description: "Pseudonymous customer key; raw customer_id never exposed."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-f]{64}$"

  - name: fct_iot_hourly
    description: "Hourly IoT metric rollup per warehouse + metric."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [warehouse_id, metric, reading_hour]
    columns:
      - name: warehouse_id
        tests: [not_null]
      - name: metric
        tests: [not_null]

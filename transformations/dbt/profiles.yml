# dbt profile for the Trino-backed Iceberg lakehouse.
# Default host=localhost works when running dbt from the host machine
# (Trino published on :8080). Override with env vars when running in-container.
supply_chain:
  target: dev
  outputs:
    dev:
      type: trino
      method: none
      host: "{{ env_var('TRINO_HOST', 'localhost') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      user: "{{ env_var('TRINO_USER', 'dbt') }}"
      catalog: iceberg
      schema: gold
      http_scheme: http
      threads: 4
